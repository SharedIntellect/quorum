pipeline:
  name: payments-service-nightly
  project: payments-service
  version: "2.3"
  schedule: "0 2 * * *"  # 02:00 UTC nightly

triggers:
  - type: schedule
  - type: manual

stages:
  - name: build
    image: node:20-alpine
    timeout_minutes: 15
    environment:
      NODE_ENV: production
      NPM_TOKEN: npm_pK9vXhQzL3mR7wT2yF8aD1sN4uC6bE0j
