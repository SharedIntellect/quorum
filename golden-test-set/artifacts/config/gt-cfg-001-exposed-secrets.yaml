    slack:
      webhook: https://hooks.example.com/services/T00000000/B00000000/FAKE_WEBHOOK_TOKEN
      channel: "#platform-alerts"
  on_success:
    slack:
      webhook: https://hooks.example.com/services/T00000000/B00000000/FAKE_WEBHOOK_TOKEN
      channel: "#deployments"

artifacts:
