findings:
  - id: GT-051
    description: >
      The "What's New in 2.3.0" section uses a mix of bullet point styles: lines
      beginning with `*` (asterisk) and lines beginning with `-` (hyphen) are
      interleaved within the same list. Specifically: `*` is used for "Added
      AsyncSearchClient," "ClientConfig class," and "Performance improvements"
      while `-` is used for "Pagination support" and "Improved error messages."
      Standard Markdown style guides (and most linters) require consistent use
      of a single bullet character within a list. Mixed styles reduce visual
      consistency and may render inconsistently across Markdown parsers.
    location: "section 'What's New in 2.3.0', bullet list"
    severity: LOW
    category: code_hygiene
    critic: code_hygiene
    rubric_criterion: null
    notes: >
      This is a genuine but minor style issue. The document is otherwise
      well-structured, accurate, and complete. The mixed bullet style does not
      affect comprehension or correctness — it is a formatting inconsistency
      only. PASS_WITH_NOTES is the correct verdict because the document is
      usable as-is; this finding warrants a note but not a revision request.

