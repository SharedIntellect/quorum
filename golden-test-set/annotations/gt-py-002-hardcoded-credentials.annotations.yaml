artifact: "artifacts/python/gt-py-002-hardcoded-credentials.py"
artifact_sha256: "50b6081082103cd590fc552df65c591e36a4c7eb84a0c417405e12ba728cae40"

expected_verdict: REJECT

findings:
  - id: GT-002
    description: >
      Hardcoded database password in connection string. `DB_PASSWORD` is assigned
      a literal production password string on line 15. Any developer with read access
      to the source repository gains the production database credential. The credential
      will also appear in version control history even if removed later.
    location: "line 15"
    severity: CRITICAL
    category: security
    critic: security
    notes: >
      The fix is to read credentials from environment variables or a secrets manager
      at runtime: `DB_PASSWORD = os.environ["DB_PASSWORD"]`. The literal value
      `"Tr0ub4dor&3_prod_2024!"` is a real-looking password that should trigger
      secret detection tooling.

  - id: GT-003
    description: >
      API key stored as a string literal. `ANALYTICS_API_KEY` on line 22 contains a
      hardcoded live API key (prefixed `sk-live-`). Exposure in source control gives
      any reader full analytics platform access under the application's identity.
    location: "line 22"
    severity: HIGH
    category: security
    critic: security
    notes: >
      Like GT-002, this should be injected at runtime from environment variables or
      a vault. The `sk-live-` prefix pattern is a common secret format used by
      Stripe-style APIs and should be caught by secret scanning rules.

false_positive_traps:
  - description: >
      `PASSWORD_PATTERN` on line 26 is a compiled regex used to detect and redact
      credential-like strings in log output. It is not a credential itself.
    location: "line 26-29"
    notes: >
      Naive pattern matching on the variable name `PASSWORD_PATTERN` or on the
      string content of the regex (which mentions "password", "secret", "token")
      would produce a false positive. The context makes clear this is a detector,
      not a secret. The `scrub_log_line` method on line 137 further confirms the
      defensive purpose of this variable.

