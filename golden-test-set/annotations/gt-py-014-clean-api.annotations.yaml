false_positive_traps:
  - description: >
      `requests.get(url, timeout=self._cfg.timeout)` in the `health()` method.
      This call includes an explicit timeout via `self._cfg.timeout`, which is
      a `(connect, read)` tuple defaulting to `(5.0, 30.0)`. It should NOT be
      flagged for missing timeout — the timeout is present.
    location: "line 155-158"
    notes: >
      A critic that checks for `requests.get()` calls without `timeout=` would
      produce a false positive here. The timeout is passed through `self._cfg.timeout`,
      which is initialized in `ClientConfig` with `DEFAULT_TIMEOUT = (5.0, 30.0)`.
      The pattern is correct and robust.

  - description: >
      The `_request()` method contains recursive calls to itself (`self._request(...)`)
      for retry handling. This is not infinite recursion — it is bounded by the
      `_attempt` counter compared against `self._cfg.max_retries`. It should not
      be flagged as unbounded recursion.
    location: "line 222-231"
    notes: >
      The recursion terminates when `_attempt > self._cfg.max_retries` (default 3),
      after which the non-2xx response is mapped to an exception. The depth is
      bounded and small.

