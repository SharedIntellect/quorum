false_positive_traps:
  - description: "rm -rf \"${old_dir}\" on line ~145 — looks like unguarded deletion"
    location: "line 145"
    notes: >
      This rm -rf is preceded by three independent guards: (1) the path is only entered if
      RELEASE_PARENT is a valid directory AND starts with DEPLOY_BASE/ (allowlist prefix check);
      (2) old_dir is populated via mapfile from a find command bounded by maxdepth/mindepth and
      constrained to RELEASE_PARENT; (3) a per-iteration guard confirms old_dir is non-empty
      AND still prefixed by RELEASE_PARENT/ before deletion. The variable is also double-quoted.
      This is the correct pattern for safe parameterised rm -rf. Not a finding.

  - description: "No explicit check that $VERSION is not 'latest' before the semver regex"
    location: "line 56"
    notes: >
      The semver regex '^[0-9]+\.[0-9]+\.[0-9]+...$' already rejects 'latest' because 'latest'
      contains no digits in the required positions. The die() path fires immediately. The script
      header also documents that 'latest is not accepted'. Defense-in-depth is adequate here;
      a separate string comparison would be redundant, not required. Not a finding.

